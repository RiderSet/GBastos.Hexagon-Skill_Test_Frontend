<div class="dashboard-header">
  <button mat-raised-button color="warn" (click)="logout()">Logout</button>
</div>

<div class="filter-section">
  <mat-form-field appearance="fill">
    <mat-label>Buscar</mat-label>
    <input matInput [(ngModel)]="searchTerm" (input)="applyFilter()">
  </mat-form-field>
</div>

<table mat-table [dataSource]="pagedData" class="mat-elevation-z8">
  <ng-container *ngFor="let col of columns" [matColumnDef]="col.key">
    <th mat-header-cell *matHeaderCellDef (click)="sort(col)">
      {{col.label}}
      <span *ngIf="sortColumn === col.key">{{ sortDirection === 'asc' ? '▲' : '▼' }}</span>
    </th>
    <td mat-cell *matCellDef="let element" [class.selected]="selectedRow === element" (click)="selectRow(element)">
      <input *ngIf="col.editable && selectedRow === element" [(ngModel)]="element[col.key]" />
      <span *ngIf="!col.editable || selectedRow !== element">{{element[col.key]}}</span>
    </td>
  </ng-container>

  <ng-container matColumnDef="actions">
    <th mat-header-cell *matHeaderCellDef> Ações </th>
    <td mat-cell *matCellDef="let element" [class.selected]="selectedRow === element">
      <button mat-button color="accent" (click)="updateRow(element)">Atualizar</button>
      <button mat-button color="warn" (click)="deleteRow(element.id)">Excluir</button>
    </td>
  </ng-container>

  <tr mat-header-row *matHeaderRowDef="columns.map(c => c.key).concat(['actions'])"></tr>
  <tr mat-row *matRowDef="let row; columns: columns.map(c => c.key).concat(['actions'])"></tr>
</table>

<mat-paginator [length]="filteredData.length"
               [pageSize]="pageSize"
               [pageSizeOptions]="[5, 10, 20]"
               (page)="handlePageEvent($event)">
</mat-paginator>
