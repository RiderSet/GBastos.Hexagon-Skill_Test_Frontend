<div class="usuarios-container">
    <h2>Usuários</h2>

    @if (loading) {
    <div class="loading">
        Carregando usuários...
    </div>
    } @if (error) {
    <div class="error">
        {{ error }}
    </div>
    } @if (!loading) { @if (usuarios.length) {
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody>
            @for (usuario of usuarios; track usuario.id) {
            <tr>
                <td>{{ usuario.id }}</td>
                <td>{{ usuario.nome }}</td>
                <td>{{ usuario.email }}</td>
            </tr>
            }
        </tbody>
    </table>
    } @if (!usuarios.length) {
    <div class="empty">
        Nenhum usuário encontrado
    </div>
    } }
</div>
