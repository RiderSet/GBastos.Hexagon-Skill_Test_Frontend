<div class="dashboard-container">
    <h2>Cadastro de Usuário</h2>

    <form [formGroup]="createForm" (ngSubmit)="addUser()" class="user-form">
        <div class="form-group">
            <label for="nome">Nome</label>
            <input id="nome" type="text" formControlName="nome" />
        </div>

        <div class="form-group">
            <label for="idade">Idade</label>
            <input id="idade" type="number" formControlName="idade" />
        </div>

        <div class="form-group">
            <label for="cpf">CPF</label>
            <input id="cpf" type="text" formControlName="cpf" />
        </div>

        <div class="form-group">
            <label for="cidade">Cidade</label>
            <input id="cidade" type="text" formControlName="cidade" />
        </div>

        <div class="form-group">
            <label for="estado">Estado</label>
            <input id="estado" type="text" formControlName="estado" />
        </div>

        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" formControlName="username" />
        </div>

        <button type="submit" [disabled]="createForm.invalid">Salvar</button>
        <button type="button" (click)="resetForm()">Limpar</button>

        <div class="page-header">
            <h2>Dashboard</h2>
            <div class="header-actions">
                <button type="submit" class="add-btn" (click)="addUser()">Adicionar</button>
                <button type="button" class="logout-btn" (click)="logout()">Sair</button>
            </div>
        </div>

    </form>

    <h3>Usuários cadastrados</h3>
    <app-table-grid [items]="items" [columns]="columns" (edit)="edit($event)" (update)="update($event)" (remove)="remove($event)" (rowSelected)="onRowSelected($event)"></app-table-grid>
</div>
