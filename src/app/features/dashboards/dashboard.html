<div class="dashboard-container">

    <!-- Cabeçalho -->
    <div class="page-header">
        <h2>Lista de Usuários</h2>

        <button class="add-btn" type="button" (click)="resetForm()">Novo Usuário +</button>
        <button class="logout-btn" type="button" (click)="logout()">Sair</button>
    </div>

    <!-- Formulário de criação -->
    <form class="top-form" [formGroup]="createForm" (ngSubmit)="addUser()" type="form">

        <div class="image-upload">
            <label for="fileInput">Imagem</label>
            <input id="fileInput" type="file" (change)="onFileSelected($event)"> @if (preview) {
            <img [src]="preview" [alt]="fileName || 'Pré-visualização da imagem'" class="preview" type="image"> }
        </div>

        <input placeholder="Nome" type="text" formControlName="nome">
        <input placeholder="Idade" type="number" formControlName="idade">
        <input placeholder="CPF" type="text" formControlName="cpf">
        <input placeholder="Cidade" type="text" formControlName="cidade">
        <input placeholder="Estado" type="text" formControlName="estado">
        <input placeholder="Username" type="text" formControlName="username">

        <button type="submit" [disabled]="createForm.invalid">Salvar</button>
    </form>

    <!-- Grid de usuários -->
    <app-table-grid type="component" [data]="items" [columns]="columns" (edit)="edit($event)" (remove)="remove($event)">
    </app-table-grid>

</div>
