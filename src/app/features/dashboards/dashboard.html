<h2>Dashboard</h2>

<form [formGroup]="editForm" (ngSubmit)="save()" class="edit-form">
    <div>
        <label for="cidade">Cidade</label>
        <input id="cidade" type="text" formControlName="cidade" placeholder="Cidade" />
    </div>

    <div>
        <label for="estado">Estado</label>
        <input id="estado" type="text" formControlName="estado" placeholder="Estado" />
    </div>

    <button type="submit" [disabled]="editForm.invalid">
    Salvar
  </button>
</form>

<h3>Usuários</h3>

<app-table-grid [data]="items" [columns]="columns" (edit)="edit($event)" (remove)="remove($event)" (selectionChange)="onSelectionChange($event)" (filterChange)="onFilterChange($event)">
</app-table-grid>
